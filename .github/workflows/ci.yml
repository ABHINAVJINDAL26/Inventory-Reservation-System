name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: allo-inventory/package-lock.json

      - name: Install dependencies
        working-directory: allo-inventory
        run: npm ci

      - name: Run lint
        working-directory: allo-inventory
        run: npm run lint

      - name: Run tests
        working-directory: allo-inventory
        run: npm test

      - name: Run build
        working-directory: allo-inventory
        run: npm run build
